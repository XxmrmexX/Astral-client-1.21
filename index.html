<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Astral Client 1.21</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg"></div>

  <div class="astral-wrapper">
    <header class="astral-header">
      <h1 class="logo">ASTRAL CLIENT</h1>
      <p class="subtitle">Eaglercraft 1.21 • Web Client</p>
    </header>

    <main class="astral-main">
      <div class="panel">
        <h2>Launch Astral</h2>
        <p>Play Eaglercraft 1.21 in your browser with the Astral Client.</p>
        <button id="launch-btn">Launch Client</button>
        <p id="status" class="status">Waiting to launch…</p>
      </div>

      <div class="panel secondary">
        <h3>About Astral</h3>
        <p>Custom‑branded Eaglercraft client focused on clean UI and smooth performance.</p>
      </div>
    </main>

    <footer class="astral-footer">
      <span>Astral Client 1.21 • Made by Kayck</span>
    </footer>
  </div>

  <script src="astral.js"></script>
</body>
</html>
